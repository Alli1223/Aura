name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The media analysis tests probe real fixture files generated with
      # ffmpeg; ubuntu-latest runners do not ship it.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Lint
        run: npm run lint -w server

      - name: Typecheck
        run: npm run typecheck -w server

      - name: Test
        run: npm run test -w server

      - name: Build
        run: npm run build -w server

  web:
    name: web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -w web

      - name: Typecheck
        run: npm run typecheck -w web

      - name: Test
        run: npm run test -w web

      - name: Build
        run: npm run build -w web

  docker:
    name: docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t aura:ci .

      - name: Smoke test container
        run: |
          sudo mkdir -p /tmp/aura-config
          sudo chown 1000:1000 /tmp/aura-config
          docker run -d --name aura -p 8096:8096 -v /tmp/aura-config:/config aura:ci
          ok=0
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8096/api/health > /dev/null; then ok=1; break; fi
            sleep 1
          done
          if [ "$ok" != "1" ]; then
            echo "server never became healthy"; docker logs aura; exit 1
          fi
          curl -fsS http://localhost:8096/api/health | grep -q '"status":"ok"'
          curl -fsS http://localhost:8096/ | grep -qi '<!doctype html'
          test "$(docker exec aura id -u)" = "1000"
          # The entrypoint must have run `prisma migrate deploy` before the
          # server started: the SQLite db file exists in the /config volume.
          docker exec aura ls /config/aura.db
          docker logs aura 2>&1 | grep -q 'prisma migrate deploy'
          docker rm -f aura

      - name: Migration failure fails fast (no server start)
        run: |
          set +e
          timeout 60 docker run --name aura-badmigrate \
            -e DATABASE_URL=file:/nonexistent-dir/x.db aura:ci
          status=$?
          set -e
          echo "container exit status: $status"
          docker logs aura-badmigrate
          if [ "$status" -eq 0 ] || [ "$status" -eq 124 ]; then
            echo "container must exit non-zero quickly when migration fails"
            docker rm -f aura-badmigrate
            exit 1
          fi
          docker logs aura-badmigrate 2>&1 | grep -q 'database migration failed'
          docker rm -f aura-badmigrate

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ffmpeg generates the fixture MP4 on the runner (the container has its
      # own ffmpeg for scanning/transcoding; this one is just for the fixture).
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Build image
        run: docker build -t aura:ci .

      - name: Generate test media fixture
        run: bash e2e/scripts/generate-fixtures.sh

      - name: Start container with fixture media mounted
        run: |
          sudo mkdir -p /tmp/aura-e2e-config
          sudo chown 1000:1000 /tmp/aura-e2e-config
          # Mount the fixtures read-only at /media (the default MEDIA_ROOTS); the
          # library is created at /media/e2e-movies. Rate limiting is disabled so
          # the suite's repeated register/login calls are never throttled.
          docker run -d --name aura-e2e -p 8096:8096 \
            -v /tmp/aura-e2e-config:/config \
            -v "$GITHUB_WORKSPACE/e2e/fixtures/media:/media:ro" \
            -e RATE_LIMIT_ENABLED=false \
            aura:ci
          ok=0
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8096/api/health > /dev/null; then ok=1; break; fi
            sleep 1
          done
          if [ "$ok" != "1" ]; then
            echo "server never became healthy"; docker logs aura-e2e; exit 1
          fi

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browser
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: e2e
        env:
          E2E_BASE_URL: http://localhost:8096
        run: npx playwright test

      - name: Container logs on failure
        if: failure()
        run: docker logs aura-e2e || true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

      - name: Tear down container
        if: always()
        run: docker rm -f aura-e2e || true
